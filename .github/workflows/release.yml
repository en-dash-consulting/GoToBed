name: Release

# Automated releases via release-please + Conventional Commits.
#
# On every push to main, release-please maintains a "Release PR" that bumps the
# version and updates CHANGELOG.md from the commit history. Merging that PR
# creates the GitHub Release + tag (vX.Y.Z); in the SAME run the `publish` job
# then builds, signs, notarizes, and attaches the DMGs. Keeping the build in the
# same workflow avoids needing a PAT (a tag pushed by GITHUB_TOKEN would not
# trigger a separate tag-triggered workflow).
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          KEYCHAIN=$RUNNER_TEMP/build.keychain-db
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Store notarization credentials
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          KEY=$RUNNER_TEMP/notary.p8
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$KEY"
          xcrun notarytool store-credentials "GoToBed-Notary" \
            --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"

      - name: Build, sign, notarize, package
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: |
          ./scripts/build-app.sh "$SIGN_IDENTITY" "GoToBed-Notary"
          ./scripts/make-dmg.sh "GoToBed-Notary"

      - name: Attach DMGs to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" build/*.dmg --clobber --repo "$GITHUB_REPOSITORY"
