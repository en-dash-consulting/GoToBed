name: Release

# Publishes a signed + notarized GoToBed.dmg to a GitHub Release whenever a
# version tag (vX.Y.Z) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags for the version

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          KEYCHAIN=$RUNNER_TEMP/build.keychain-db
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Store notarization credentials
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          KEY=$RUNNER_TEMP/notary.p8
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$KEY"
          xcrun notarytool store-credentials "GoToBed-Notary" \
            --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"

      - name: Build, sign, notarize, package
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: |
          ./scripts/build-app.sh "$SIGN_IDENTITY" "GoToBed-Notary"
          ./scripts/make-dmg.sh "GoToBed-Notary"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/GoToBed-*.dmg
          generate_release_notes: true
