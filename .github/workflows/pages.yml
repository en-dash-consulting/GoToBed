name: Pages

# Publish the site to GitHub Pages via a single Actions-built artifact:
#   - the marketing site (docs/) at the domain root
#   - the n-dx dashboard (rendered from the committed .sourcevision/.rex data)
#     at /n-dx/
#
# This replaces the legacy "deploy from main:/docs" Pages build. The dashboard is
# regenerated on every deploy, so nothing rendered is committed to the repo.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".sourcevision/**"
      - ".rex/prd_tree/**"
      - ".rex/tree-meta.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; never cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Pin to the published version for reproducible dashboards.
      - name: Install n-dx
        run: npm install -g @n-dx/core@0.4.5

      # Workaround for an @n-dx/core@0.4.5 packaging bug: `ndx export` resolves
      # its rex/web siblings from a monorepo path (<node_modules>/packages/<pkg>),
      # and its npm fallback throws because the @n-dx/* exports maps expose no
      # `require`/`./package.json` entry (ERR_PACKAGE_PATH_NOT_EXPORTED). Recreate
      # the packages/ tree it expects, pointing at the installed @n-dx/*. The
      # node_modules is derived from the `ndx` binary (the install that runs); the
      # deps are nested under @n-dx/core/node_modules in a global install, so each
      # is located by name (find does not follow the symlinks we create).
      - name: Patch n-dx package resolution
        run: |
          core_dir="$(dirname "$(readlink -f "$(command -v ndx)")")"   # <nm>/@n-dx/core
          nm="$(cd "$core_dir/../.." && pwd -P)"                        # <node_modules>
          echo "ndx node_modules: $nm"
          mkdir -p "$nm/packages"
          for name in rex sourcevision web hench llm-client; do
            src="$(find "$nm" -type d -path "*/@n-dx/$name" 2>/dev/null | head -1)"
            [ -n "$src" ] && ln -sfn "$src" "$nm/packages/$name" && echo "linked $name -> $src"
          done
          ls -la "$nm/packages"
          test -e "$nm/packages/rex/dist/public.js"  # fail fast if the layout is wrong

      - name: Assemble site (marketing + n-dx dashboard)
        run: |
          rm -rf _site
          mkdir -p _site
          # Marketing site at the root (includes CNAME for the custom domain).
          cp -R docs/. _site/
          # n-dx dashboard at /n-dx/, rendered from the committed analysis data.
          ndx export --base-path=/n-dx/ --out-dir=_site/n-dx .

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
